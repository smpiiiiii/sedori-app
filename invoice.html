<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>請求書</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Yu Mincho', 'Hiragino Mincho Pro', serif; background: #f0f0f0; }
        .page {
            width: 210mm; min-height: 297mm; margin: 20px auto; padding: 40px 50px;
            background: #fff; box-shadow: 0 2px 10px rgba(0,0,0,.15);
        }
        @media print {
            body { background: #fff; }
            .page { margin: 0; padding: 30px 40px; box-shadow: none; width: 100%; }
            .no-print { display: none !important; }
        }
        h1 { text-align: center; font-size: 28px; letter-spacing: 12px; border-bottom: 3px solid #333; padding-bottom: 12px; margin-bottom: 30px; }
        .date { text-align: right; font-size: 14px; margin-bottom: 24px; }
        .to { margin-bottom: 30px; }
        .to .company { font-size: 18px; font-weight: bold; }
        .to .name { font-size: 16px; margin-top: 4px; }
        .to .suffix { font-size: 14px; }
        .amount-box {
            border: 2px solid #333; padding: 16px 24px; text-align: center;
            margin-bottom: 30px; font-size: 24px; font-weight: bold;
        }
        .amount-box .label { font-size: 14px; font-weight: normal; margin-bottom: 4px; }
        .from { text-align: right; margin-bottom: 30px; line-height: 1.8; font-size: 14px; }
        .from .company { font-size: 16px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #333; padding: 10px 14px; font-size: 14px; }
        th { background: #f5f5f5; font-weight: bold; text-align: center; }
        td { text-align: center; }
        td.left { text-align: left; }
        td.right { text-align: right; }
        .total-row td { font-weight: bold; font-size: 16px; background: #fafafa; }
        .notes { margin-top: 30px; font-size: 13px; line-height: 1.8; }
        .notes h3 { font-size: 14px; margin-bottom: 8px; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
        .stamp-area { display: flex; justify-content: flex-end; margin-top: 20px; }
        .stamp-box { width: 80px; height: 80px; border: 1px dashed #999; display: flex; align-items: center; justify-content: center; color: #999; font-size: 11px; }
        .print-btn {
            display: block; margin: 20px auto; padding: 12px 40px; background: #333; color: #fff;
            border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-family: sans-serif;
        }
        .print-btn:hover { background: #555; }
    </style>
</head>
<body>

<button class="print-btn no-print" onclick="window.print()">🖨️ 印刷 / PDF保存</button>

<div class="page">
    <h1>請　求　書</h1>

    <div class="date">発行日：2026年3月22日</div>
    <div class="date">請求番号：INV-20260322-001</div>

    <!-- 宛先 -->
    <div class="to">
        <div class="company">株式会社obake</div>
        <div class="name">代表取締役　下京 慶子 <span class="suffix">様</span></div>
    </div>

    <!-- 請求金額 -->
    <div class="amount-box">
        <div class="label">ご請求金額（税込）</div>
        ¥10,000-
    </div>

    <!-- 差出人 -->
    <div class="from">
        <div class="company">横山 進平</div>
        <div style="margin-top:8px">【お振込先】</div>
        <div>三菱UFJ銀行 西池袋支店</div>
        <div>普通 0297919</div>
        <div>ヨコヤマ シンペイ</div>
    </div>

    <!-- 明細 -->
    <table>
        <thead>
            <tr>
                <th style="width:10%">No.</th>
                <th style="width:40%">品目・内容</th>
                <th style="width:15%">数量</th>
                <th style="width:15%">単価</th>
                <th style="width:20%">金額</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td class="left">日当</td>
                <td>2 日</td>
                <td class="right">¥5,000</td>
                <td class="right">¥10,000</td>
            </tr>
            <tr>
                <td></td>
                <td class="left"></td>
                <td></td>
                <td class="right"></td>
                <td class="right"></td>
            </tr>
            <tr>
                <td></td>
                <td class="left"></td>
                <td></td>
                <td class="right"></td>
                <td class="right"></td>
            </tr>
        </tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="4" class="right">合計（税込）</td>
                <td class="right">¥10,000</td>
            </tr>
        </tfoot>
    </table>

    <!-- 備考 -->
    <div class="notes">
        <h3>備考</h3>
        <p>・お支払い期限：2026年4月30日</p>
        <p>・お振込手数料はご負担をお願いいたします。</p>
    </div>

    <!-- 印鑑欄 -->
    <div class="stamp-area">
        <div class="stamp-box">印</div>
    </div>
</div>

</body>
</html>
